<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger X — Private Messaging</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --bg: #0f0f13;
            --surface: #16161e;
            --surface-light: #1e1e28;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text: #fafafa;
            --text-secondary: #8b8b9e;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #22c55e;
            --error: #ef4444;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Aurora background */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }

        .aurora-blob:nth-child(1) {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--accent-glow), transparent);
            top: -200px;
            right: -100px;
        }

        .aurora-blob:nth-child(2) {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3), transparent);
            bottom: -150px;
            left: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* Noise texture */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px;
            box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.02);
            animation: enter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 20px;
            display: grid;
            place-items: center;
            box-shadow: 0 20px 40px -10px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2));
        }

        .logo svg {
            width: 32px;
            height: 32px;
            color: white;
            position: relative;
            z-index: 1;
        }

        .badge {
            position: absolute;
            top: -4px;
            right: -20px;
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: white;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtitle::before,
        .subtitle::after {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--border-strong);
        }

        /* Button */
        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .google-btn.loading .btn-text {
            opacity: 0;
        }

        .google-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* Error */
        .error {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            font-size: 13px;
            color: #fca5a5;
            animation: shake 0.4s ease;
        }

        .error.visible {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .error svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .feature {
            text-align: center;
            padding: 16px 8px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .feature:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 10px;
            display: grid;
            place-items: center;
            color: var(--accent);
            transition: all 0.2s ease;
        }

        .feature:hover .feature-icon {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .feature-icon svg {
            width: 18px;
            height: 18px;
        }

        .feature-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        /* Footer */
        .footer {
            margin-top: 32px;
            text-align: center;
        }

        .dev {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .dev:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-strong);
            color: var(--text);
        }

        .dev strong {
            color: var(--text);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 40px 28px;
            }

            h1 {
                font-size: 28px;
            }

            .features {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .feature {
                padding: 12px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="aurora">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>
    <div class="noise"></div>

    <main class="card">
        <div class="header">
            <div class="logo-wrap">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <span class="badge">Live</span>
            </div>
            <h1>Stranger X</h1>
            <p class="subtitle">Private Messaging</p>
        </div>

        <button id="googleLoginBtn" class="google-btn" onclick="handleGoogleLogin()">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="btn-text">Continue with Google</span>
        </button>

        <div id="errorMessage" class="error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>Authentication failed. Please try again.</span>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <span class="feature-label">Real-time</span>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <span class="feature-label">Secure</span>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <span class="feature-label">Media</span>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <span class="feature-label">Groups</span>
            </div>
        </div>

        <div class="footer">
            <div class="dev">
                <span>Built by <strong>Adrian Ng</strong></span>
            </div>
        </div>
    </main>

    <script src="firebase-config.js"></script>
    <script>
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        firebase.auth().onAuthStateChanged((user) => {
            if (user) window.location.replace('chat.html');
        });

        async function handleGoogleLogin() {
            const btn = document.getElementById('googleLoginBtn');
            const err = document.getElementById('errorMessage');
            
            btn.classList.add('loading');
            err.classList.remove('visible');
            
            try {
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    photoURL: user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=6366f1&color=fff&size=200`,
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                
            } catch (error) {
                const errors = {
                    'auth/popup-closed-by-user': 'Sign-in cancelled',
                    'auth/popup-blocked': 'Popup blocked by browser',
                    'auth/network-request-failed': 'Network error'
                };
                err.querySelector('span').textContent = errors[error.code] || 'Authentication failed';
                err.classList.add('visible');
                btn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
